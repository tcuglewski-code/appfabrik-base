# =============================================================================
# AppFabrik Mobile App — EAS Build Pipeline
# =============================================================================
# 
# This workflow builds the mobile app for new customers using EAS.
# 
# WORKFLOW FOR NEW CUSTOMER:
# 1. Copy app-template/ to customer repo
# 2. Update config/tenant.ts with customer branding
# 3. Set the following secrets in GitHub repo:
#    - EXPO_TOKEN: Expo access token (from expo.dev)
#    - EAS_PROJECT_ID: EAS project ID
# 4. Trigger build via workflow_dispatch or push to main
#
# OPTIONAL SECRETS (for App Store/Play Store submission):
#    - APPLE_ID, ASC_APP_ID, APPLE_TEAM_ID (iOS)
#    - GOOGLE_SERVICE_ACCOUNT_KEY (Android)
#
# =============================================================================

name: EAS Build Pipeline

on:
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: 'Submit to store after build'
        required: false
        default: false
        type: boolean
  
  # Auto-build on release tags
  push:
    tags:
      - 'v*'
    paths:
      - 'app-template/**'

env:
  NODE_VERSION: '20'
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ============================================================================
  # Pre-Build Checks
  # ============================================================================
  preflight:
    name: Pre-Build Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-template
    outputs:
      version: ${{ steps.version.outputs.version }}
      buildNumber: ${{ steps.version.outputs.buildNumber }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app-template/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint || true

      - name: Extract version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "buildNumber=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "📱 Version: $VERSION (Build: $BUILD_NUMBER)"

  # ============================================================================
  # Android Build
  # ============================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      github.event.inputs.platform == 'android' || 
      github.event.inputs.platform == 'all' || 
      startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: app-template
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app-template/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Set EAS Project ID
        run: |
          echo "Setting EAS_PROJECT_ID..."
          export EAS_PROJECT_ID="${{ secrets.EAS_PROJECT_ID }}"

      - name: Build Android
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "🤖 Building Android with profile: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Submit to Google Play (if requested)
        if: |
          github.event.inputs.submit == 'true' && 
          github.event.inputs.profile == 'production'
        run: |
          echo "📤 Submitting to Google Play..."
          eas submit \
            --platform android \
            --latest \
            --non-interactive
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

  # ============================================================================
  # iOS Build
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      github.event.inputs.platform == 'ios' || 
      github.event.inputs.platform == 'all' || 
      startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: app-template
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app-template/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "🍎 Building iOS with profile: $PROFILE"
          eas build \
            --platform ios \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Submit to App Store (if requested)
        if: |
          github.event.inputs.submit == 'true' && 
          github.event.inputs.profile == 'production'
        run: |
          echo "📤 Submitting to App Store..."
          eas submit \
            --platform ios \
            --latest \
            --non-interactive
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # ============================================================================
  # Build Status Summary
  # ============================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [preflight, build-android, build-ios]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## 📱 AppFabrik App Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.preflight.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ needs.preflight.outputs.buildNumber }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | ${{ github.event.inputs.profile || 'preview' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | ${{ github.event.inputs.platform || 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Preflight: ${{ needs.preflight.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Android: ${{ needs.build-android.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- iOS: ${{ needs.build-ios.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 View builds at [expo.dev](https://expo.dev)" >> $GITHUB_STEP_SUMMARY
