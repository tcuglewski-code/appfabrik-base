openapi: 3.1.0
info:
  title: AppFabrik / Feldhub Base API
  version: 1.0.0
  description: |
    Generische API für AppFabrik White-Label Field-Service-Management Plattform.
    Gilt als Vorlage für alle Tenants (Koch Aufforstung, zukünftige Kunden).
  contact:
    name: Feldhub Support
    email: support@feldhub.de
  license:
    name: Proprietary
    identifier: UNLICENSED

servers:
  - url: https://{tenant}.vercel.app/api
    description: Production
    variables:
      tenant:
        default: ka-forstmanager
        description: Tenant Subdomain
  - url: http://localhost:3000/api
    description: Lokal

tags:
  - name: Auth
    description: Authentifizierung (NextAuth)
  - name: Auftraege
    description: Aufträge / Projekte
  - name: Mitarbeiter
    description: Mitarbeiter-Verwaltung
  - name: Kunden
    description: Kunden / Kontakte
  - name: Einsaetze
    description: Außeneinsätze
  - name: Protokolle
    description: Tagesprotokolle
  - name: Export
    description: Daten-Export
  - name: System
    description: System & Health

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - VALIDATION_ERROR
                - CONFLICT
                - INTERNAL_ERROR
                - RATE_LIMITED
            message:
              type: string
            details:
              type: object

    Auftrag:
      type: object
      required: [id, titel, status, tenantId, createdAt]
      properties:
        id:
          type: string
          format: cuid
        titel:
          type: string
        beschreibung:
          type: string
          nullable: true
        status:
          type: string
          enum: [NEU, IN_BEARBEITUNG, ABGESCHLOSSEN, STORNIERT]
        prioritaet:
          type: string
          enum: [NIEDRIG, MITTEL, HOCH, KRITISCH]
        kundeId:
          type: string
          nullable: true
        mitarbeiterId:
          type: string
          nullable: true
        startDatum:
          type: string
          format: date
          nullable: true
        endDatum:
          type: string
          format: date
          nullable: true
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    AuftragCreate:
      type: object
      required: [titel]
      properties:
        titel:
          type: string
          minLength: 1
          maxLength: 200
        beschreibung:
          type: string
          maxLength: 5000
        status:
          type: string
          enum: [NEU, IN_BEARBEITUNG, ABGESCHLOSSEN, STORNIERT]
          default: NEU
        prioritaet:
          type: string
          enum: [NIEDRIG, MITTEL, HOCH, KRITISCH]
          default: MITTEL
        kundeId:
          type: string
        mitarbeiterId:
          type: string
        startDatum:
          type: string
          format: date
        endDatum:
          type: string
          format: date

    Mitarbeiter:
      type: object
      required: [id, name, tenantId]
      properties:
        id:
          type: string
          format: cuid
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        telefon:
          type: string
          nullable: true
        rolle:
          type: string
          enum: [ADMIN, MANAGER, MITARBEITER, GRUPPENFÜHRER]
        aktiv:
          type: boolean
          default: true
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time

    Kontakt:
      type: object
      required: [id, name, tenantId]
      properties:
        id:
          type: string
          format: cuid
        name:
          type: string
        typ:
          type: string
          enum: [KUNDE, PARTNER, LIEFERANT, SONSTIGES]
        email:
          type: string
          format: email
          nullable: true
        telefon:
          type: string
          nullable: true
        adresse:
          type: string
          nullable: true
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time

security:
  - sessionCookie: []
  - bearerToken: []

paths:
  /health:
    get:
      tags: [System]
      summary: Health Check
      security: []
      responses:
        '200':
          description: System läuft
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  tenant:
                    type: string
                    example: ka

  /auftraege:
    get:
      tags: [Auftraege]
      summary: Aufträge abrufen
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: search
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string, default: createdAt }
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: filter[status]
          in: query
          schema:
            type: string
            enum: [NEU, IN_BEARBEITUNG, ABGESCHLOSSEN, STORNIERT]
      responses:
        '200':
          description: Auftragslist
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Auftrag' }
                  meta: { $ref: '#/components/schemas/Pagination' }
        '401':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
          description: Nicht authentifiziert

    post:
      tags: [Auftraege]
      summary: Auftrag erstellen
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuftragCreate' }
      responses:
        '201':
          description: Auftrag erstellt
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Auftrag' }
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auftraege/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Auftraege]
      summary: Einzelner Auftrag
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Auftrag' }
          description: Auftrag gefunden
        '404':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
          description: Nicht gefunden
    patch:
      tags: [Auftraege]
      summary: Auftrag aktualisieren
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuftragCreate' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Auftrag' }
          description: Aktualisiert
    delete:
      tags: [Auftraege]
      summary: Auftrag löschen (soft)
      responses:
        '200':
          description: Gelöscht
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      deletedAt: { type: string, format: date-time }

  /mitarbeiter:
    get:
      tags: [Mitarbeiter]
      summary: Mitarbeiter abrufen
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20 }
        - name: aktiv
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Mitarbeiterliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Mitarbeiter' }
                  meta: { $ref: '#/components/schemas/Pagination' }

  /kontakte:
    get:
      tags: [Kunden]
      summary: Kontakte / Kunden abrufen
      parameters:
        - name: typ
          in: query
          schema:
            type: string
            enum: [KUNDE, PARTNER, LIEFERANT, SONSTIGES]
      responses:
        '200':
          description: Kontaktliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Kontakt' }
                  meta: { $ref: '#/components/schemas/Pagination' }

  /export/{format}:
    get:
      tags: [Export]
      summary: Daten exportieren
      parameters:
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [csv, pdf, xlsx]
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum: [auftraege, mitarbeiter, protokolle, stunden]
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Export-Datei
          content:
            text/csv:
              schema: { type: string }
            application/pdf:
              schema: { type: string, format: binary }
